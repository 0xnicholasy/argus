# P16 — argus-axl-a (AXL Node A, Signal). Private only — no public TLS.
#
# Reachable from sibling Fly apps via Fly 6PN at:
#   argus-axl-a.internal:9002          AXL JSON API (dialed by argus-shim)
#   tls://argus-axl-a.internal:9101    Yggdrasil tls listener (dialed by axl-b)
#
# Note: do NOT add an [http_service] block — Fly's launcher inserts one
# automatically when invoked with `fly launch`, which wires a public TLS
# edge we don't want. deploy-axl.sh uses `fly apps create` to avoid that.

app = 'argus-axl-a'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.axl'

[env]
  AXL_ROLE = 'signal'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

# 6PN-only TCP check on the API port. ports = [] keeps Fly from
# allocating a public anycast IP for this service.
[[services]]
  protocol = 'tcp'
  internal_port = 9002
  ports = []
  # Stay running so KeeperHub-driven /trigger calls don't time out
  # waiting on a 6PN cold-start (Fly only auto-wakes machines for
  # public requests, not internal *.internal traffic).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
