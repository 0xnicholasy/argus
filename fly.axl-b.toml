# P16 — argus-axl-b (AXL Node B, Execution). Private only — no public TLS.
#
# Reachable from sibling Fly apps via Fly 6PN at:
#   argus-axl-b.internal:9003          AXL JSON API (diagnostics)
#   tls://argus-axl-b.internal:9102    Yggdrasil tls listener
#
# Node B dials node A's tls://argus-axl-a.internal:9101 — that wiring
# lives in the per-app NODE_CONFIG_JSON secret, not this file.

app = 'argus-axl-b'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.axl'

[env]
  AXL_ROLE = 'execution'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[services]]
  protocol = 'tcp'
  internal_port = 9003
  ports = []

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
