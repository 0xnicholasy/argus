# fly.toml app configuration file generated for argus-shim-aged-mountain-2075 on 2026-04-28T13:23:21+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'argus-shim-aged-mountain-2075'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.shim'

[env]
  AXL_NODE_A_API = '127.0.0.1:9002'
  SHIM_POLL_BUDGET_MS = '60000'
  SHIM_POLL_INTERVAL_MS = '500'
  SHIM_PORT = '8787'
  SHIM_REQUEST_TTL_MS = '300000'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
